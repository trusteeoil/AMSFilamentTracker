<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Filament Tracker" />
  <title>AMS Filament Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="page-home" class="page active">
    <header class="app-header">
      <h1>AMS Filament Tracker</h1>
      <button id="btn-settings" class="icon-btn" aria-label="Open settings">
        &#9881;
      </button>
    </header>

    <main class="printer-list">
      <!-- Printer cards generated by JS -->
    </main>
  </div>

  <!-- SETTINGS PAGE -->
  <div id="page-settings" class="page">
    <header class="app-header">
      <button id="btn-back" class="icon-btn" aria-label="Back to home">
        &#8592;
      </button>
      <h1>Settings</h1>
    </header>

    <main class="settings-content">
      <section class="settings-section">
        <h2>Data</h2>

        <div class="settings-row">
          <div class="settings-row-info">
            <span class="settings-label">Export data</span>
            <span class="settings-description">Download all filament data as a JSON file</span>
          </div>
          <button id="btn-export" class="action-btn">Export JSON</button>
        </div>

        <div class="settings-row">
          <div class="settings-row-info">
            <span class="settings-label">Import data</span>
            <span class="settings-description">Load a previously exported JSON file — overwrites all current data</span>
          </div>
          <button id="btn-import" class="action-btn">Import JSON</button>
          <input type="file" id="import-file-input" accept=".json" style="display:none" aria-label="Select JSON file to import" />
        </div>

        <div class="settings-row last-exported-row">
          <span class="settings-label">Last exported:</span>
          <span id="last-exported-display" class="last-exported-value">Never</span>
        </div>
      </section>

      <section class="settings-section">
        <h2>About</h2>
        <div class="settings-row">
          <span class="settings-label">Version</span>
          <span id="app-version" class="version-badge"></span>
        </div>
      </section>
    </main>
  </div>

  <!-- EDIT MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">

      <!-- Title -->
      <div class="modal-header">
        <h2 id="modal-title">Update Slot</h2>
      </div>

      <!-- Tab bar -->
      <div class="modal-tabs" role="tablist" aria-label="How to update this slot">
        <button class="modal-tab active" id="tab-weigh" role="tab" aria-selected="true" aria-controls="panel-weigh">
          Weigh Spool
        </button>
        <button class="modal-tab" id="tab-adjust" role="tab" aria-selected="false" aria-controls="panel-adjust">
          Add / Subtract
        </button>
      </div>

      <!-- Scrollable content -->
      <div class="modal-body">

        <!-- PANEL: Weigh (default) -->
        <div id="panel-weigh" class="modal-panel" role="tabpanel" aria-labelledby="tab-weigh">
          <label class="field-label" for="input-weight">
            Total weight on scale (spool + filament) in grams
          </label>
          <input
            type="number"
            id="input-weight"
            class="text-input"
            placeholder="e.g. 310"
            min="0"
            step="1"
          />

          <label class="field-label" for="select-spool">
            Spool type (used to calculate filament remaining)
          </label>
          <select id="select-spool" class="select-input">
            <option value="165">Elegoo Cardboard (165g empty)</option>
            <option value="256">Bambu Plastic (256g empty)</option>
          </select>

          <div class="filament-remaining-display">
            <span class="filament-remaining-label">Filament remaining:</span>
            <span id="filament-remaining-value" class="filament-remaining-value">—</span>
          </div>
        </div>

        <!-- PANEL: Adjust -->
        <div id="panel-adjust" class="modal-panel hidden" role="tabpanel" aria-labelledby="tab-adjust">
          <div class="adjust-current-row">
            <span class="adjust-current-label">Current filament on record</span>
            <span id="adjust-current-grams" class="adjust-current-value">—</span>
          </div>

          <div class="adjust-mode-row">
            <button id="btn-subtract" class="adjust-mode-btn active" aria-pressed="true">− Subtract</button>
            <button id="btn-add" class="adjust-mode-btn" aria-pressed="false">+ Add</button>
          </div>

          <label class="field-label" for="input-adjust-grams" id="adjust-input-label">
            Grams to subtract
          </label>
          <input
            type="number"
            id="input-adjust-grams"
            class="text-input"
            placeholder="e.g. 50"
            min="0"
            step="1"
          />

          <div class="filament-remaining-display">
            <span class="filament-remaining-label">After adjustment:</span>
            <span id="adjust-after-value" class="filament-remaining-value">—</span>
          </div>
        </div>

      </div><!-- /.modal-body -->

      <!-- Always-visible buttons, never hidden by keyboard -->
      <div class="modal-buttons">
        <button id="btn-modal-cancel" class="modal-btn cancel-btn">Cancel</button>
        <button id="btn-modal-ok" class="modal-btn ok-btn">OK — Save</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
